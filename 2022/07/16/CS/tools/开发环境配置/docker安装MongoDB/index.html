                <h2 id="通过docker安装MongoDB"><a href="#通过docker安装MongoDB" class="headerlink" title="通过docker安装MongoDB"></a>通过docker安装MongoDB</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><code class="hljs shell"><span class="hljs-meta prompt_">#</span><span class="language-bash">拉取镜像</span><br>docker pull mongo:4.0.3<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">创建容器</span><br>docker create --name mongodb-server -p 27017:27017 -v mongodb-data:/data/db mongo:4.0.3 --auth<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">启动容器</span><br>docker start mongodb-server<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">进入容器</span><br>docker exec -it mongodb-server /bin/bash<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">进入admin数据库</span><br>mongo<br>use admin<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">添加管理员，其拥有管理用户和角色的权限</span><br>db.createUser(&#123; user: &#x27;root&#x27;, pwd: &#x27;root&#x27;, roles: [ &#123; role: &quot;root&quot;, db: &quot;admin&quot; &#125; ] &#125;)<br><span class="hljs-meta prompt_">#</span><span class="language-bash">退出后进行认证</span><br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">进行认证</span><br>mongo -u &quot;root&quot; -p &quot;root&quot; --authenticationDatabase &quot;admin&quot;<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">通过admin添加普通用户</span><br>use admin<br>db.createUser(&#123; user: &#x27;house&#x27;, pwd: &#x27;YourPassWord&#x27;, roles: [ &#123; role: &quot;readWrite&quot;, db: &quot;house&quot; &#125; ] &#125;);<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">通过tanhua用户登录进行测试</span><br>mongo -u &quot;house&quot; -p &quot;YourPassWord&quot; --authenticationDatabase &quot;admin&quot;<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_">#</span><span class="language-bash">发现可以正常进入控制台进行操作</span><br></code></pre></td></tr></table></figure>
