le">destFile</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">File</span>(<span class="hljs-string">&quot;C:\\a\\b\\c&quot;</span>);<br>        <span class="hljs-comment">// 调用方法拷贝</span><br>        copyDir(srcFile, destFile);<br>    &#125;<br><br>    <span class="hljs-comment">/**</span><br><span class="hljs-comment">     * 拷贝目录</span><br><span class="hljs-comment">     * <span class="hljs-doctag">@param</span> srcFile 拷贝源</span><br><span class="hljs-comment">     * <span class="hljs-doctag">@param</span> destFile 拷贝目标</span><br><span class="hljs-comment">     */</span><br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">static</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">copyDir</span><span class="hljs-params">(File srcFile, File destFile)</span> &#123;<br>        <span class="hljs-keyword">if</span>(srcFile.isFile()) &#123;<br>            <span class="hljs-comment">// srcFile如果是一个文件的话，递归结束。</span><br>            <span class="hljs-comment">// 是文件的时候需要拷贝。</span><br>            <span class="hljs-comment">// ....一边读一边写。</span><br>            <span class="hljs-type">FileInputStream</span> <span class="hljs-variable">in</span> <span class="hljs-operator">=</span> <span class="hljs-literal">null</span>;<br>            <span class="hljs-type">FileOutputStream</span> <span class="hljs-variable">out</span> <span class="hljs-operator">=</span> <span class="hljs-literal">null</span>;<br>            <span class="hljs-keyword">try</span> &#123;<br>                <span class="hljs-comment">// 读这个文件</span><br>                <span class="hljs-comment">// D:\course\02-JavaSE\document\JavaSE进阶讲义\JavaSE进阶-01-面向对象.pdf</span><br>                in = <span class="hljs-keyword">new</span> <span class="hljs-title class_">FileInputStream</span>(srcFile);<br>                <span class="hljs-comment">// 写到这个文件中</span><br>                <span class="hljs-comment">/   Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));
  });
</script>
